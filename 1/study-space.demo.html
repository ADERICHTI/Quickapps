<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>STUDY SPACE // Code & Conquer</title>
  <style>
    /* ----- GLOBAL DESIGN TOKENS (Core Spec) ----- */
    :root {
      --color-canvas-primary: #08090A;
      --color-surface-widget: #121417;
      --color-accent-scientist: #00F0FF;
      --color-telemetry-amber: #FFB300;
      --color-border-rail: #1E222B;
      --font-mono: 'Courier New', 'Fira Code', monospace;
      --font-sans: 'Google Sans', 'Inter', system-ui, -apple-system, sans-serif;
      --transition-sweep: cubic-bezier(0.25, 1, 0.5, 1);
      --scale-micro: transform 80ms ease;
      --radius-sm: 12px;
      --radius-md: 20px;
    }
    [data-theme="light"] {
      --color-canvas-primary: #F8F9FA;
      --color-surface-widget: #FFFFFF;
      --color-accent-scientist: #0055FF;
      --color-telemetry-amber: #D97706;
      --color-border-rail: #E2E8F0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--color-canvas-primary);
      color: var(--color-accent-scientist);
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }
    #app {
      width: 100%; max-width: 420px; height: 100vh; position: relative;
      overflow: hidden; border-left: 1px solid var(--color-border-rail);
      border-right: 1px solid var(--color-border-rail);
      background: var(--color-canvas-primary);
      display: flex; flex-direction: column;
    }
    * { box-shadow: none !important; } /* Zero shadows, as per spec */

    /* ----- TELEMETRY & TYPOGRAPHY ----- */
    .telemetry, .mono, .points, .rank, .counter, .timer {
      font-family: var(--font-mono); font-weight: bold; letter-spacing: -0.5px;
    }
    h2, h3 { font-family: var(--font-sans); font-weight: 600; }

    /* ----- BUTTONS & INTERACTIONS (Google playfulness) ----- */
    button, .clickable {
      transition: var(--scale-micro); cursor: pointer; border: 1px solid transparent;
      background: transparent; color: inherit; font-family: inherit;
      border-radius: var(--radius-sm); outline: none;
    }
    button:active, .clickable:active { transform: scale(1.04); }
    .btn-primary {
      border: 1px solid var(--color-accent-scientist);
      color: var(--color-accent-scientist); background: rgba(0,240,255,0.05);
      padding: 0.8rem 1.6rem; font-size: 1rem; text-transform: uppercase;
      letter-spacing: 1.5px; text-align: center; border-radius: var(--radius-md);
      font-weight: 600;
    }
    .btn-primary.large { padding: 1.2rem 2rem; font-size: 1.3rem; }

    /* ----- VIEW SWEEP TRANSITION ----- */
    .view {
      position: absolute; top:0; left:0; width:100%; height:100%;
      display: flex; flex-direction: column; background: var(--color-canvas-primary);
      transition: transform 0.4s var(--transition-sweep), opacity 0.3s;
      will-change: transform; overflow-y: auto; padding: 1rem;
    }
    .view.hidden { transform: translateX(100%); opacity:0; pointer-events:none; }
    .view.active { transform: translateX(0); opacity:1; pointer-events:auto; }
    .view.sweep-left { transform: translateX(-100%); }

    /* ----- CARD STYLE (CodeWars clean + Google rounded) ----- */
    .card {
      background: var(--color-surface-widget); border: 1px solid var(--color-border-rail);
      border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 0.8rem;
      transition: border-color 0.2s;
    }
    .card.accent-left { border-left: 4px solid var(--color-accent-scientist); }
    .card.amber-left { border-left: 4px solid var(--color-telemetry-amber); }

    /* ----- BOTTOM NAVIGATION (Material-like) ----- */
    .bottom-nav {
      display: flex; justify-content: space-around; padding: 0.8rem 0;
      border-top: 1px solid var(--color-border-rail); margin-top: auto;
      background: var(--color-surface-widget);
    }
    .nav-icon {
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      font-size: 0.7rem; color: var(--color-border-rail); text-transform: uppercase;
      background: transparent; border: none; opacity: 0.7;
    }
    .nav-icon.active { color: var(--color-accent-scientist); opacity:1; }
    .nav-icon .emoji { font-size: 1.4rem; }

    /* ----- LEADERBOARD SNIPPET ----- */
    .leaderboard-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--color-border-rail);
    }

    /* ----- STREAK FLAME ANIMATION ----- */
    .streak-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: rgba(255,179,0,0.15); padding: 0.3rem 0.8rem; border-radius: 20px;
      border: 1px solid var(--color-telemetry-amber);
    }
    @keyframes flicker {
      0% { opacity:1; transform:scale(1); } 50% { opacity:0.8; transform:scale(1.1); } 100% { opacity:1; transform:scale(1); }
    }
    .streak-fire { display:inline-block; animation: flicker 0.5s infinite; }

    /* ----- GAME ENGINE UI (shared) ----- */
    .tension-rail {
      height: 6px; background: var(--color-accent-scientist);
      border-radius: 3px; transition: background 0.3s;
    }
    .tension-rail.escalated { background: var(--color-telemetry-amber); }
    .question-box {
      border: 1px solid var(--color-border-rail); border-radius: var(--radius-sm);
      padding: 1.2rem; background: var(--color-surface-widget); font-size: 1.1rem;
    }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .option {
      border: 1px solid var(--color-border-rail); border-radius: var(--radius-sm);
      padding: 0.8rem; text-align: center; background: var(--color-surface-widget);
      font-weight: 500;
    }
    .option.locked {
      opacity:0.5; pointer-events:none; border-color: var(--color-telemetry-amber);
      position:relative;
    }
    .option.locked::after {
      content: "🔒"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size: 1.2rem;
    }
    .timer-display {
      font-size: 2.5rem; text-align: center; font-family: var(--font-mono);
      color: var(--color-accent-scientist); font-weight: 700;
    }
    .timer-display.warning { color: var(--color-telemetry-amber); animation: pulse 0.5s infinite; }
    @keyframes pulse {
      0% { transform:scale(1); } 50% { transform:scale(1.08); } 100% { transform:scale(1); }
    }
    .lockout-overlay {
      position: absolute; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center;
      font-family: var(--font-mono); color: var(--color-telemetry-amber); font-size:1.5rem;
      border-radius: var(--radius-sm); z-index:10;
    }

    /* ----- CLAN GATE LOCK ----- */
    .clan-lock {
      border: 1px solid var(--color-border-rail); border-radius: var(--radius-sm);
      padding: 1rem; text-align: center; color: var(--color-telemetry-amber);
      background: var(--color-surface-widget); font-family: var(--font-mono);
    }

    /* ----- ROSTER OVERLAY ----- */
    .roster-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: var(--color-canvas-primary); z-index:20; overflow-y:auto; padding:1rem;
      transform: translateX(100%); transition: transform 0.3s var(--transition-sweep);
    }
    .roster-overlay.open { transform: translateX(0); }

    /* ----- CHAT ----- */
    .chat-messages {
      border:1px solid var(--color-border-rail); border-radius:var(--radius-sm);
      height:120px; overflow-y:auto; padding:0.5rem; background:var(--color-surface-widget);
      font-family: var(--font-mono); font-size:0.8rem;
    }
    .chat-input { display:flex; gap:0.5rem; margin-top:0.5rem; }
    .chat-input input {
      flex:1; background:transparent; border:1px solid var(--color-border-rail);
      padding:0.5rem; border-radius:var(--radius-sm); color:inherit; font-family:inherit;
    }

    /* ----- FOCUS WARNING ----- */
    .focus-warning {
      position:fixed; top:10px; left:50%; transform:translateX(-50%);
      background:var(--color-telemetry-amber); color:black; padding:0.5rem 1rem;
      border-radius:var(--radius-sm); font-family:var(--font-mono); z-index:30; display:none;
    }

    /* ----- CELEBRATION CONFETTI (simple CSS sparkle) ----- */
    .celebrate {
      position:relative;
    }
    .celebrate::after {
      content:"✨🎉"; position:absolute; top:-10px; right:-20px; font-size:1.5rem;
      animation: pop 0.4s ease-out;
    }
    @keyframes pop {
      0% { transform:scale(0); opacity:0; } 50% { transform:scale(1.4); opacity:1; } 100% { transform:scale(1); opacity:0; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="focus-warning" id="focus-warning">⚠️ FOCUS LOST – PENALTY</div>
  <script>
    // ===================== STUDY SPACE SPA (Google × CodeWars Edition) =====================
    const AppState = {
      currentUser: null,
      users: [
        { id:'u1', name:'Alex Neural', email:'operator@studyspace.com', password:'password123', points:14500, rank:4.12, avatar:'AN', clanId:'sandbox_1A', lastActive:Date.now(), streak:5 },
        { id:'u2', name:'Sam Synapse', email:'sam@s.com', password:'test', points:2500, rank:2.15, avatar:'SS', clanId:'sandbox_1B', lastActive:Date.now()-90000000, streak:0 },
        { id:'u3', name:'Jordan Cortex', email:'j@s.com', password:'test', points:80000, rank:7.83, avatar:'JC', clanId:'league_A', lastActive:Date.now(), streak:12 }
      ],
      clans: {
        sandbox_1A: { name:'Neuron Knights', members:['u1'], combinedPoints:14500, placement:'#5' },
        sandbox_1B: { name:'Synaptic Striders', members:['u2'], combinedPoints:2500, placement:'#12' },
        league_A: { name:'Cortex Collective', members:['u3'], combinedPoints:80000, placement:'#1' }
      },
      tournamentBracket: [
        { match:'Neuron Knights vs Synaptic Striders', status:'upcoming' },
        { match:'Cortex Collective vs Axon Alliance', status:'live' }
      ],
      chatMessages: [{ user:'SYSTEM', text:'Welcome to Clan Chat.', timestamp:Date.now() }],
      currentView: 'landing',
      gameSession: null,
      practiceTimerMode: 'auto',
      customTimerSeconds: 10
    };

    // ----- THEME & ROUTING -----
    function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
    function navigateTo(viewName, direction='forward') {
      const app = document.getElementById('app');
      const current = app.querySelector('.view.active');
      if (current) {
        current.classList.remove('active'); current.classList.add('hidden');
        if (direction === 'back') current.classList.add('sweep-left');
        setTimeout(() => { current.remove(); renderView(viewName); }, 100);
      } else renderView(viewName);
    }

    function renderView(name) {
      const app = document.getElementById('app');
      const view = document.createElement('div'); view.className='view active';
      view.dataset.view = name;
      switch(name) {
        case 'landing': renderLanding(view); break;
        case 'auth': renderAuth(view); break;
        case 'dashboard': renderDashboard(view); break;
        case 'practice': renderPractice(view); break;
        case 'arena': renderArena(view); break;
        case 'tournament': renderTournament(view); break;
        case 'clan': renderClan(view); break;
        default: break;
      }
      app.appendChild(view);
      AppState.currentView = name;
    }

    // ----- LANDING (terminal gate, Google-styled) -----
    function renderLanding(container) {
      container.innerHTML = `
        <button class="theme-toggle" id="themeToggleLanding" style="position:absolute; top:1rem; right:1rem; font-size:1.5rem;">🌓</button>
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:2rem;">
          <div class="scramble-title mono" id="scrambleTitle" style="font-size:3rem; font-weight:900; color:var(--color-accent-scientist);">STUDY SPACE</div>
          <p style="opacity:0.8; font-family:var(--font-sans);">Code battles. Clan wars. Glory.</p>
          <button class="btn-primary large" id="initSessionBtn">INITIALIZE SESSION</button>
        </div>
      `;
      scrambleText(container.querySelector('#scrambleTitle'), 'STUDY SPACE', 400);
      container.querySelector('#themeToggleLanding').addEventListener('click', ()=>{
        applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
      });
      container.querySelector('#initSessionBtn').addEventListener('click', ()=>navigateTo('auth'));
    }

    function scrambleText(el, final, dur) {
      const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let i=0; const max=10, intv=dur/max;
      const t=setInterval(()=>{
        el.textContent=final.split('').map((c,idx)=>idx<i?final[idx]:chars[Math.floor(Math.random()*chars.length)]).join('');
        if(++i>=max){clearInterval(t);el.textContent=final;}
      },intv);
    }

    // ----- AUTH GATE -----
    function renderAuth(container) {
      container.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:1.2rem; margin-top:3rem; padding:1rem;">
          <h2 class="mono" style="text-align:center;">AUTH GATE</h2>
          <input id="authEmail" placeholder="OPERATOR_ID" class="mono" style="padding:0.8rem; background:transparent; border:1px solid var(--color-border-rail); border-radius:12px; color:inherit;">
          <input id="authPassword" type="password" placeholder="ACCESS_PASSPHRASE" class="mono" style="padding:0.8rem; background:transparent; border:1px solid var(--color-border-rail); border-radius:12px; color:inherit;">
          <div id="authError" style="color:var(--color-telemetry-amber); min-height:1.2rem;"></div>
          <button class="btn-primary" id="authLoginBtn">AUTHENTICATE</button>
          <button style="margin-top:0.5rem; opacity:0.7;" id="authBackBtn">← TERMINAL</button>
        </div>
      `;
      container.querySelector('#authLoginBtn').addEventListener('click', ()=>{
        const email=container.querySelector('#authEmail').value.trim();
        const pass=container.querySelector('#authPassword').value;
        const err=container.querySelector('#authError');
        if(!email||!pass){ err.textContent='ERR: FIELDS REQUIRED'; return; }
        const user=AppState.users.find(u=>u.email===email&&u.password===pass);
        if(user){
          AppState.currentUser=user;
          applyDecay(user);
          container.querySelector('#authLoginBtn').style.borderColor='var(--color-accent-scientist)';
          setTimeout(()=>navigateTo('dashboard'),300);
        }else err.textContent='ERR: INVALID CREDENTIALS';
      });
      container.querySelector('#authBackBtn').addEventListener('click',()=>navigateTo('landing','back'));
    }

    function applyDecay(user) {
      const now=Date.now(), td=86400000, lambda=0.1;
      if(now-user.lastActive > td) {
        const t=(now-user.lastActive-td)/3600000;
        user.points=Math.floor(user.points*Math.exp(-lambda*t));
        user.lastActive=now;
        user.rank=calculateRank(user.points);
      }
    }

    function calculateRank(p) {
      if(p<0)return 1.0;
      const cost=3000;
      if(p<=cost*3.99) return 1 + p/cost;
      const extra=p-cost*3.99;
      return Math.min(10, 5+(5*Math.log(1+extra/1000))/Math.log(1+50000/1000));
    }

    // ----- DASHBOARD (CodeWars leaderboard tease + Google cards) -----
    function renderDashboard(container) {
      const u=AppState.currentUser, clan=AppState.clans[u.clanId];
      container.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:0.8rem; height:100%;">
          <div class="card accent-left" style="display:flex; align-items:center; gap:1rem;">
            <div style="font-size:2rem;">👤</div>
            <div>
              <div style="font-weight:600;">${u.name}</div>
              <div class="telemetry points-large" style="font-size:1.6rem;">${u.points.toLocaleString()} PTS</div>
              <div class="telemetry">RANK ${u.rank.toFixed(2)}</div>
            </div>
            <div style="margin-left:auto;" class="streak-badge"><span class="streak-fire">🔥</span> ${u.streak} day streak</div>
          </div>
          <div class="card">
            <div style="font-weight:600;">🏆 Global Leaderboard</div>
            ${AppState.users.sort((a,b)=>b.points-a.points).slice(0,3).map((usr,idx)=>`
              <div class="leaderboard-item">
                <span>${idx+1}. ${usr.name}</span>
                <span class="telemetry">${usr.points.toLocaleString()} PTS</span>
              </div>`).join('')}
          </div>
          <div class="card amber-left" style="display:flex; justify-content:space-between; align-items:center;">
            <div><strong>${clan.name}</strong><br><span class="telemetry">${clan.combinedPoints.toLocaleString()} PTS | #${clan.placement}</span></div>
            <button class="btn-primary" id="openClanBtn">CLAN HALL</button>
          </div>
          <div style="display:flex; flex-direction:column; gap:0.5rem;">
            <button class="btn-primary" id="launchPractice">🧪 PRACTICE SANDBOX</button>
            <button class="btn-primary" id="enterArena">⚔️ LIVE ARENA</button>
            <button class="btn-primary" id="registerTournament">🏟️ TOURNAMENT</button>
          </div>
          <div class="bottom-nav">
            <button class="nav-icon active" data-nav="dashboard"><span class="emoji">🏠</span>Home</button>
            <button class="nav-icon" data-nav="practice"><span class="emoji">🧪</span>Practice</button>
            <button class="nav-icon" data-nav="arena"><span class="emoji">⚔️</span>Arena</button>
            <button class="nav-icon" data-nav="tournament"><span class="emoji">🏟️</span>Tournament</button>
            <button class="nav-icon" data-nav="clan"><span class="emoji">👥</span>Clan</button>
          </div>
        </div>
      `;
      [...container.querySelectorAll('.nav-icon')].forEach(b=>b.addEventListener('click',(e)=>{
        const v=e.currentTarget.dataset.nav; if(v!=='dashboard')navigateTo(v);
      }));
      container.querySelector('#openClanBtn').addEventListener('click',()=>navigateTo('clan'));
      container.querySelector('#launchPractice').addEventListener('click',()=>navigateTo('practice'));
      container.querySelector('#enterArena').addEventListener('click',()=>navigateTo('arena'));
      container.querySelector('#registerTournament').addEventListener('click',()=>navigateTo('tournament'));
    }

    // ============ SHARED CBT ENGINE (with celebration) ============
    class CBTEngine {
      constructor(mode, config={}) {
        this.mode=mode; this.config=config;
        this.questions=this.generateQuestions();
        this.currentIndex=0; this.score=0; this.timeLeft=this.getInitialTime();
        this.timerInterval=null; this.sessionActive=false; this.difficultyLevel=1;
        this.lockout=false; this.botAnswered=false; this.botTimeout=null;
        this.onUpdate=null; this.onSessionEnd=null; this.focusPenalty=false;
        this.setupFocusSafeguard();
      }
      generateQuestions(){ return [
        { q:'What is 2+2?', options:['3','4','5','6'], correct:1 },
        { q:'Capital of France?', options:['Berlin','Madrid','Paris','Rome'], correct:2 },
        { q:'React is a...', options:['Database','Framework','Library','Language'], correct:2 },
        { q:'Pi to 2 decimals?', options:['3.14','3.16','3.12','2.14'], correct:0 },
        { q:'H2O is...', options:['Hydrogen','Oxygen','Water','Salt'], correct:2 }
      ];}
      getInitialTime(){
        if(this.mode==='practice'){
          if(this.config.timerMode==='auto') return Math.max(3,10-this.difficultyLevel*0.5);
          return this.config.customSeconds>0?this.config.customSeconds:9999;
        }
        return 8-this.difficultyLevel*0.3;
      }
      startSession(){
        this.sessionActive=true; this.currentIndex=0; this.score=0; this.difficultyLevel=1;
        this.lockout=false; this.botAnswered=false;
        if(this.onUpdate)this.onUpdate(this.getState());
        this.startTimer(); if(this.mode!=='practice')this.scheduleBotAnswer();
      }
      stopSession(){ this.sessionActive=false; clearInterval(this.timerInterval); clearTimeout(this.botTimeout); }
      startTimer(){
        this.timeLeft=this.getInitialTime(); clearInterval(this.timerInterval);
        this.timerInterval=setInterval(()=>{
          if(!this.sessionActive)return;
          this.timeLeft=Math.max(0,this.timeLeft-0.1);
          if(this.onUpdate)this.onUpdate(this.getState());
          if(this.timeLeft<=0)this.handleTimeout();
        },100);
      }
      scheduleBotAnswer(){
        const delay=(this.getInitialTime()*0.6+Math.random()*0.8)*1000;
        this.botTimeout=setTimeout(()=>{
          if(this.sessionActive&&!this.lockout&&!this.botAnswered){
            this.botAnswered=true;
            const correct=this.questions[this.currentIndex].correct;
            this.submitAnswer(Math.random()<0.8?correct:(correct+1)%4, true);
          }
        },delay);
      }
      submitAnswer(choice, isBot=false){
        if(!this.sessionActive||this.lockout)return;
        const q=this.questions[this.currentIndex]; const correct=choice===q.correct;
        if(this.mode!=='practice' && !isBot) this.lockout=true;
        if(correct){
          const bonus=this.timeLeft>0?Math.floor(this.timeLeft*10):0;
          this.score+=100+bonus+this.difficultyLevel*20;
          // Celebration sparkle on correct answer (handled in UI update)
          if(this.onUpdate) this.onUpdate({...this.getState(), celebrate:true});
        }
        this.difficultyLevel++;
        if(this.currentIndex<this.questions.length-1){
          this.currentIndex++; this.lockout=false; this.botAnswered=false;
          clearTimeout(this.botTimeout); this.startTimer();
          if(this.mode!=='practice')this.scheduleBotAnswer();
        }else{ this.endSession(); }
      }
      handleTimeout(){ if(this.sessionActive) this.submitAnswer(-1); }
      endSession(){
        this.stopSession();
        AppState.currentUser.points+=this.score;
        AppState.currentUser.rank=calculateRank(AppState.currentUser.points);
        AppState.currentUser.streak+=1;
        if(this.onSessionEnd)this.onSessionEnd(this.score);
      }
      getState(){
        return { question:this.questions[this.currentIndex], timer:Math.ceil(this.timeLeft),
          difficulty:this.difficultyLevel, score:this.score, lockout:this.lockout,
          sessionActive:this.sessionActive, mode:this.mode };
      }
      setupFocusSafeguard(){
        if(this.mode==='arena'||this.mode==='tournament'){
          document.addEventListener('visibilitychange',()=>{
            if(document.hidden&&this.sessionActive&&!this.focusPenalty){
              this.focusPenalty=true; this.score-=200;
              AppState.currentUser.points=Math.max(0,AppState.currentUser.points-200);
              document.getElementById('focus-warning').style.display='block';
              setTimeout(()=>document.getElementById('focus-warning').style.display='none',2000);
              if(this.onUpdate)this.onUpdate(this.getState());
            }
          });
        }
      }
    }

    // ----- PRACTICE (dual mode, celebration) -----
    function renderPractice(container) {
      container.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:1rem; height:100%;">
          <h2 class="mono">🧪 PRACTICE SANDBOX</h2>
          <div id="practiceConfig" class="card">
            <label class="mono">Timer Mode:</label>
            <select id="timerModeSelect" class="mono" style="padding:0.5rem; border-radius:8px; background:transparent; border:1px solid var(--color-border-rail);">
              <option value="auto" ${AppState.practiceTimerMode==='auto'?'selected':''}>Auto (Bot Speed)</option>
              <option value="custom" ${AppState.practiceTimerMode==='custom'?'selected':''}>Custom</option>
            </select>
            <div id="customTimerDiv" style="margin-top:0.5rem; ${AppState.practiceTimerMode==='custom'?'':'display:none;'}">
              <label class="mono">Seconds (0=No Limit):</label>
              <input id="customSecondsInput" type="number" value="${AppState.customTimerSeconds}" min="0" step="1" style="width:80px; padding:0.5rem; background:transparent; border:1px solid var(--color-border-rail); border-radius:8px;">
            </div>
            <button class="btn-primary" id="startPracticeBtn" style="margin-top:0.8rem;">START</button>
          </div>
          <div id="practiceGameArea" style="display:none; flex-direction:column; gap:1rem; flex:1;">
            <div class="tension-rail" id="tensionRail"></div>
            <div class="timer-display" id="practiceTimer">10</div>
            <div class="question-box" id="practiceQuestion"></div>
            <div class="options-grid" id="practiceOptions"></div>
            <div class="telemetry">Score: <span id="practiceScore">0</span></div>
            <button class="btn-primary" id="endPracticeBtn">END</button>
          </div>
        </div>
      `;
      const modeSel=container.querySelector('#timerModeSelect');
      modeSel.addEventListener('change',(e)=>{
        container.querySelector('#customTimerDiv').style.display=e.target.value==='custom'?'block':'none';
      });
      container.querySelector('#startPracticeBtn').addEventListener('click',()=>{
        AppState.practiceTimerMode=modeSel.value;
        const sec=parseInt(container.querySelector('#customSecondsInput').value,10)||10;
        AppState.customTimerSeconds=sec;
        container.querySelector('#practiceConfig').style.display='none';
        container.querySelector('#practiceGameArea').style.display='flex';
        const engine=new CBTEngine('practice',{timerMode:AppState.practiceTimerMode, customSeconds:sec});
        AppState.gameSession=engine;
        engine.onUpdate=(state)=>updatePracticeUI(container,state);
        engine.onSessionEnd=(s)=>alert(`Session ended! +${s} PTS`);
        engine.startSession();
      });
      container.querySelector('#endPracticeBtn')?.addEventListener('click',()=>{
        if(AppState.gameSession)AppState.gameSession.stopSession(); navigateTo('dashboard');
      });
    }

    function updatePracticeUI(container,state){
      const timer=container.querySelector('#practiceTimer'); if(timer){ timer.textContent=state.timer; timer.className='timer-display'+(state.timer<=3?' warning':''); }
      const rail=container.querySelector('#tensionRail'); if(rail) rail.className='tension-rail'+(state.difficulty>3?' escalated':'');
      const q=container.querySelector('#practiceQuestion'); if(q) q.textContent=state.question.q;
      const opts=container.querySelector('#practiceOptions'); if(opts){
        opts.innerHTML=''; state.question.options.forEach((opt,idx)=>{
          const btn=document.createElement('button'); btn.className='option'+(state.lockout?' locked':'');
          btn.textContent=opt; btn.addEventListener('click',()=>{ if(!state.lockout)AppState.gameSession.submitAnswer(idx); });
          opts.appendChild(btn);
        });
      }
      container.querySelector('#practiceScore').textContent=state.score;
      if(state.celebrate) { container.querySelector('#practiceScore').classList.add('celebrate'); setTimeout(()=>container.querySelector('#practiceScore').classList.remove('celebrate'),500); }
    }

    function renderArena(container){ competitiveView(container,'arena','⚔️ LIVE ARENA'); }
    function renderTournament(container){ competitiveView(container,'tournament','🏟️ TOURNAMENT'); }

    function competitiveView(container,mode,title){
      container.innerHTML=`
        <div style="display:flex; flex-direction:column; gap:1rem; height:100%;">
          <h2 class="mono">${title}</h2>
          <div id="${mode}GameArea" style="flex:1; display:flex; flex-direction:column; gap:1rem;">
            <div class="tension-rail" id="${mode}TensionRail"></div>
            <div class="timer-display" id="${mode}Timer">8</div>
            <div class="question-box" id="${mode}Question"></div>
            <div class="options-grid" id="${mode}Options"></div>
            <div class="telemetry">Score: <span id="${mode}Score">0</span></div>
            <div id="${mode}LockoutOverlay" style="display:none;" class="lockout-overlay">🔒 LOCKED</div>
            <button class="btn-primary" id="quit${mode.charAt(0).toUpperCase()+mode.slice(1)}Btn">LEAVE</button>
          </div>
        </div>`;
      const engine=new CBTEngine(mode);
      AppState.gameSession=engine;
      engine.onUpdate=(state)=>updateCompetitiveUI(container,state,mode);
      engine.onSessionEnd=(s)=>alert(`Match over! +${s} PTS`);
      engine.startSession();
      container.querySelector(`#quit${mode.charAt(0).toUpperCase()+mode.slice(1)}Btn`).addEventListener('click',()=>{engine.stopSession();navigateTo('dashboard');});
    }

    function updateCompetitiveUI(container,state,prefix){
      document.getElementById(`${prefix}Timer`).textContent=state.timer;
      document.getElementById(`${prefix}Timer`).className='timer-display'+(state.timer<=3?' warning':'');
      document.getElementById(`${prefix}TensionRail`).className='tension-rail'+(state.difficulty>3?' escalated':'');
      document.getElementById(`${prefix}Question`).textContent=state.question.q;
      const opts=document.getElementById(`${prefix}Options`); opts.innerHTML='';
      state.question.options.forEach((opt,idx)=>{
        const btn=document.createElement('button'); btn.className='option'+(state.lockout?' locked':'');
        btn.textContent=opt; btn.addEventListener('click',()=>{if(!state.lockout)AppState.gameSession.submitAnswer(idx);});
        opts.appendChild(btn);
      });
      document.getElementById(`${prefix}Score`).textContent=state.score;
      document.getElementById(`${prefix}LockoutOverlay`).style.display=state.lockout?'flex':'none';
      if(state.celebrate){ document.getElementById(`${prefix}Score`).classList.add('celebrate'); setTimeout(()=>document.getElementById(`${prefix}Score`).classList.remove('celebrate'),500); }
    }

    // ----- CLAN DASHBOARD (unchanged functionally, styled) -----
    function renderClan(container){
      const u=AppState.currentUser, clan=AppState.clans[u.clanId], isSandbox=u.rank<3.0;
      container.innerHTML=`
        <div style="display:flex; flex-direction:column; gap:1rem; height:100%;">
          <h2 class="mono">👥 ${clan.name}</h2>
          <div class="telemetry">Combined Worth: ${clan.combinedPoints.toLocaleString()} PTS (μ=1/√N) | #${clan.placement}</div>
          <div class="hr" style="height:1px; background:var(--color-border-rail);"></div>
          <div id="clanGate">${isSandbox?`
            <div class="clan-lock">[LOCK // ACCESSIBLE_AT_RANK_3.00]</div>
            <p>Sandbox Clan ${u.clanId.split('_')[1]}</p>`:`
            <div>League Clans unlocked:</div>
            <div style="display:flex; gap:0.5rem;">${['A','B','C','D','E','F','G'].map(c=>`<button class="btn-primary">Clan ${c}</button>`).join('')}</div>`}
          </div>
          <button class="btn-primary" id="viewRosterBtn">VIEW OPERATORS</button>
          <div class="chat-messages" id="clanChatMessages">${AppState.chatMessages.map(m=>`<div><b>${m.user}:</b> ${m.text}</div>`).join('')}</div>
          <div class="chat-input"><input id="chatInputField" placeholder="Message..."><button id="sendChatBtn" class="btn-primary">SEND</button></div>
          <button class="btn-primary" id="backToDashboardBtn">← BACK</button>
          <div class="roster-overlay" id="rosterOverlay"><button id="closeRosterBtn">✕</button><div id="rosterList"></div></div>
        </div>`;
      container.querySelector('#viewRosterBtn').addEventListener('click',()=>{
        const list=container.querySelector('#rosterList');
        list.innerHTML=clan.members.map(uid=>AppState.users.find(u=>u.id===uid)).map(m=>`
          <div class="card" style="display:flex; justify-content:space-between;">
            <span>${m.name}</span><span class="telemetry">${m.points} PTS</span>
            <span style="color:${m.id===u.id?'var(--color-accent-scientist)':'var(--color-border-rail)'}">${m.id===u.id?'ONLINE':'OFFLINE'}</span>
          </div>`).join('');
        container.querySelector('#rosterOverlay').classList.add('open');
      });
      container.querySelector('#closeRosterBtn').addEventListener('click',()=>container.querySelector('#rosterOverlay').classList.remove('open'));
      container.querySelector('#sendChatBtn').addEventListener('click',()=>{
        const inp=container.querySelector('#chatInputField'); const msg=inp.value.trim();
        if(msg){ AppState.chatMessages.push({user:u.name,text:msg,timestamp:Date.now()}); inp.value=''; updateChat(container); }
      });
      setInterval(()=>{ if(AppState.currentView==='clan'&&Math.random()<0.2){ AppState.chatMessages.push({user:'BOT',text:'Nice!',timestamp:Date.now()}); if(document.getElementById('clanChatMessages')) updateChat(document.querySelector('.view.active')); } },6000);
      container.querySelector('#backToDashboardBtn').addEventListener('click',()=>navigateTo('dashboard','back'));
    }
    function updateChat(container){ const c=container.querySelector('#clanChatMessages'); if(c){ c.innerHTML=AppState.chatMessages.slice(-10).map(m=>`<div><b>${m.user}:</b> ${m.text}</div>`).join(''); c.scrollTop=c.scrollHeight; } }

    // ----- INIT -----
    window.addEventListener('load', ()=>navigateTo('landing'));
  </script>
</body>
</html>
