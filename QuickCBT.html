<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Pro Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
        .nav-scroll::-webkit-scrollbar { height: 6px; }
        .nav-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .correct { background: #d1fae5; border-color: #059669; }
        .wrong { background: #fee2e2; border-color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="home-view" class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm">
        <h1 class="text-2xl font-bold mb-4">CBT Engine</h1>
        <textarea id="json-input" class="w-full h-96 p-4 border rounded-xl font-mono text-xs" placeholder="Paste your large JSON bank here..."></textarea>
        <div class="flex gap-4 mt-6">
            <input type="number" id="question-limit" value="10" class="border p-2 rounded w-24">
            <button onclick="startTest()" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold">Start Test</button>
        </div>
    </div>

    <div id="cbt-view" class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm hidden">
        <div id="nav-strip" class="flex gap-2 overflow-x-auto pb-4 nav-scroll mb-6 border-b"></div>
        <div id="q-content" class="min-h-[300px]">
            <h2 id="q-text" class="text-xl font-medium mb-6"></h2>
            <div id="options" class="space-y-3"></div>
        </div>
        <div class="flex justify-between mt-10">
            <button onclick="changeQ(-1)" class="text-gray-500 font-bold">Previous</button>
            <button onclick="changeQ(1)" class="bg-gray-800 text-white px-6 py-2 rounded-lg">Next</button>
        </div>
    </div>

    <script>
        let data, currentIdx = 0, userAnswers = [];

        function startTest() {
            try {
                data = JSON.parse(document.getElementById('json-input').value).questions;
                const limit = parseInt(document.getElementById('question-limit').value);
                data = data.slice(0, limit);
                userAnswers = new Array(data.length).fill(null);
                
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('cbt-view').classList.remove('hidden');
                renderNav();
                loadQ();
            } catch { alert("Invalid JSON"); }
        }

        function renderNav() {
            const strip = document.getElementById('nav-strip');
            strip.innerHTML = data.map((_, i) => `
                <button onclick="jumpTo(${i})" class="px-4 py-2 bg-gray-100 rounded-lg min-w-[40px] font-bold">
                    ${i + 1}
                </button>
            `).join('');
        }

        function loadQ() {
            const q = data[currentIdx];
            document.getElementById('q-text').innerText = q.question;
            const container = document.getElementById('options');
            container.innerHTML = q.options.map(opt => `
                <button onclick="select('${opt}', '${q.answer}')" 
                        class="w-full text-left p-4 border rounded-xl hover:bg-blue-50 ${userAnswers[currentIdx] === opt ? 'bg-blue-100' : ''}">
                    ${opt}
                </button>
            `).join('');
        }

        function select(choice, correct) {
            userAnswers[currentIdx] = choice;
            loadQ();
        }

        function changeQ(dir) {
            currentIdx = Math.max(0, Math.min(data.length - 1, currentIdx + dir));
            loadQ();
        }

        function jumpTo(i) { currentIdx = i; loadQ(); }
    </script>
</body>
</html>
