<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .correct-reveal { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .wrong-reveal { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div id="home-view" class="app-card w-full max-w-xl p-8 space-y-6">
        <h1 class="text-3xl font-bold text-gray-900">CBT Engine</h1>
        <textarea id="json-input" class="w-full h-48 p-4 bg-gray-50 border border-gray-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder='Paste your JSON here...'></textarea>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-gray-600">Test Mode</label>
                <select id="mode-select" class="p-3 border rounded-lg bg-white">
                    <option value="practice">Practice Mode</option>
                    <option value="study">Study Mode</option>
                </select>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-gray-600">Question Count</label>
                <input type="number" id="question-limit" value="10" min="1" class="p-3 border rounded-lg">
            </div>
        </div>
        
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="shuffle-toggle" class="w-5 h-5 text-blue-600">
            <span>Shuffle Questions</span>
        </label>
        
        <button onclick="startTest()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg">Start Test</button>
    </div>

    <div id="cbt-view" class="app-card w-full max-w-2xl p-8 hidden flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 id="quiz-title" class="text-xl font-bold"></h2>
            <span id="progress" class="text-sm font-bold bg-blue-100 text-blue-800 px-3 py-1 rounded-full"></span>
        </div>
        <div id="question-area" class="mb-8">
            <p id="q-text" class="text-lg font-medium mb-6"></p>
            <div id="options" class="space-y-3"></div>
        </div>
        <button id="next-btn" onclick="nextQ()" class="hidden w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Next Question</button>
    </div>

    <script>
        let quizData, currentIdx, score, mode;

        function startTest() {
            try {
                quizData = JSON.parse(document.getElementById('json-input').value);
                if(document.getElementById('shuffle-toggle').checked) quizData.questions.sort(() => Math.random() - 0.5);
                
                const limit = parseInt(document.getElementById('question-limit').value);
                quizData.questions = quizData.questions.slice(0, limit);

                mode = document.getElementById('mode-select').value;
                currentIdx = 0; score = 0;
                
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('cbt-view').classList.remove('hidden');
                document.getElementById('quiz-title').innerText = quizData.title;
                loadQ();
            } catch { alert("Invalid JSON"); }
        }

        function loadQ() {
            if(currentIdx >= quizData.questions.length) return showResults();
            const q = quizData.questions[currentIdx];
            document.getElementById('progress').innerText = `${currentIdx + 1}/${quizData.questions.length}`;
            document.getElementById('q-text').innerText = q.question;
            const container = document.getElementById('options');
            container.innerHTML = '';
            document.getElementById('next-btn').classList.add('hidden');

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border rounded-xl hover:border-blue-400 transition-all";
                btn.innerText = opt;
                btn.onclick = () => check(btn, opt, q.answer);
                container.appendChild(btn);
            });
        }

        function check(btn, selected, correct) {
            const btns = document.querySelectorAll('#options button');
            btns.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                score++;
                btn.classList.add('correct-reveal');
            } else {
                btn.classList.add('wrong-reveal');
                if(mode === 'study') {
                    btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct-reveal'); });
                }
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQ() { currentIdx++; loadQ(); }

        function showResults() {
            document.getElementById('cbt-view').innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-4">Quiz Complete!</h2>
                    <p class="text-4xl font-black text-blue-600 mb-8">${score} / ${quizData.questions.length}</p>
                    <button onclick="location.reload()" class="bg-gray-800 text-white px-8 py-3 rounded-xl">Back to Home</button>
                </div>
            `;
        }
    </script>
</body>
</html>
